<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parser API — Tester</title>
<style>
  :root {
    --bg: #0f1117; --panel: #181b24; --panel-2: #1f2330; --border: #2a2f3e;
    --text: #e6e8ee; --muted: #9aa3b2; --accent: #6ea8fe; --accent-2: #4ade80;
    --warn: #fbbf24; --bad: #f87171; --chip: #262b3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 64px; }
  .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0; font-size: 14px; }
  .sub code { background: var(--panel-2); padding: 1px 6px; border-radius: 5px; }

  .badge { display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 99px;
    padding: 6px 12px; font-size: 12px; color: var(--muted); }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .badge.ok .dot { background: var(--accent-2); } .badge.ok { color: var(--text); }
  .badge.bad .dot { background: var(--bad); } .badge.bad { color: var(--bad); }

  .settings { display: flex; gap: 12px; margin: 16px 0 4px; flex-wrap: wrap; }
  .settings .f { flex: 1; min-width: 220px; }
  .settings label, .field label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 4px; }
  input[type=text], input[type=password] {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  textarea {
    width: 100%; min-height: 340px; resize: vertical; background: var(--panel-2);
    color: var(--text); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font: 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .row { display: flex; align-items: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  button {
    background: var(--accent); color: #06122b; border: 0; border-radius: 8px;
    padding: 9px 16px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  button:hover { filter: brightness(1.07); }
  button.ghost { background: var(--chip); color: var(--text); font-weight: 500; }
  button.sm { font-size: 12px; padding: 6px 10px; }
  button:disabled { opacity: .5; cursor: default; }
  input[type=number] { width: 64px; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 7px; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .spacer { flex: 1; }
  .empty { color: var(--muted); font-size: 14px; padding: 24px 4px; }
  .rtools { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 10px; }

  .emph { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 12px; }
  .emph .tag { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .emph .label { font-size: 18px; font-weight: 700; margin: 2px 0 8px; }
  .emph .label .id { font-size: 12px; color: var(--muted); font-weight: 500; }
  .emph.secondary .label { color: var(--accent); }
  .emph.primary .label { color: var(--accent-2); }
  .bar { height: 7px; background: var(--chip); border-radius: 99px; overflow: hidden; margin: 8px 0; }
  .bar > i { display: block; height: 100%; background: var(--accent); }
  .emph.primary .bar > i { background: var(--accent-2); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { background: var(--chip); border: 1px solid var(--border); border-radius: 99px;
    padding: 3px 10px; font-size: 12px; }
  .chip .s { color: var(--muted); margin-left: 5px; font-size: 11px; }
  .chip.lex { border-color: #3a5; } .chip.both { border-color: var(--accent); }
  h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 22px 0 10px; }
  .ranked { display: flex; flex-direction: column; gap: 6px; }
  .ranked .item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .ranked .item .nm { width: 200px; } .ranked .item .bar { flex: 1; margin: 0; }
  .ranked .item .pct { width: 46px; text-align: right; color: var(--muted); }
  .meta { color: var(--muted); font-size: 12px; margin-top: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
  .warn { color: var(--warn); }
  details { margin-top: 16px; } summary { cursor: pointer; color: var(--muted); font-size: 13px; }
  pre { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; overflow: auto; font-size: 12px; max-height: 320px; }
  .err { color: var(--bad); font-size: 14px; }

  .tax { margin-top: 20px; }
  .taxgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 12px; }
  @media (max-width: 860px) { .taxgrid { grid-template-columns: 1fr; } }
  .taxgrid .cat { font-size: 13px; padding: 3px 0; }
  .taxgrid .cat .id { color: var(--muted); font-size: 11px; margin-left: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>Parser API — Tester</h1>
      <p class="sub">Paste text, hit Parse. Returns broad <b>emphases</b> (taxonomy + lexicon) and
         specific <b>keywords</b> (RAKE) — no LLM. Endpoint: <code>POST /api/parse</code>.</p>
    </div>
    <span id="badge" class="badge"><span class="dot"></span><span id="badgeText">checking…</span></span>
  </div>

  <div class="settings">
    <div class="f">
      <label for="baseUrl">API base URL <span style="opacity:.6">(blank = this origin)</span></label>
      <input type="text" id="baseUrl" placeholder="https://parser-api.vercel.app" autocomplete="off" spellcheck="false" />
    </div>
    <div class="f">
      <label for="apiKey">X-API-Key <span style="opacity:.6">(only if the API requires one)</span></label>
      <input type="password" id="apiKey" placeholder="(none)" autocomplete="off" />
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="presets">
        <button class="ghost sm" data-ex="de">Data Engineer JD</button>
        <button class="ghost sm" data-ex="phys">Physics Lecture</button>
        <button class="ghost sm" data-ex="clear">Clear</button>
      </div>
      <div class="field"><label for="text">Input text</label></div>
      <textarea id="text" placeholder="Paste a job description, lecture transcript, article…"></textarea>
      <div class="row">
        <button id="go">Parse</button>
        <label style="margin:0;color:var(--muted);font-size:13px">keywords
          <input type="number" id="maxkw" value="15" min="1" max="50" />
        </label>
        <span class="spacer"></span>
        <button class="ghost sm" id="copycurl">Copy as curl</button>
      </div>
    </div>

    <div class="panel">
      <div id="out"><div class="empty">Results will appear here.</div></div>
    </div>
  </div>

  <details class="tax" id="taxBox">
    <summary>Taxonomy — the vocabulary the parser can return</summary>
    <div class="row" style="margin-top:10px">
      <button class="ghost sm" id="taxRefresh">Refresh</button>
      <span id="taxCount" class="sub"></span>
    </div>
    <div id="taxOut" class="taxgrid"></div>
  </details>
</div>

<script>
const INJECTED_KEY = "__API_KEY__";
const $ = (id) => document.getElementById(id);
const out = $('out');
let lastResponse = null;
let taxLoaded = false;

const EXAMPLES = {
  de: `Senior Data Engineer
We are seeking a Data Engineer to design and build scalable data pipelines and ETL
workflows that power our analytics platform. You will own our data warehouse and data
lake, model data for downstream consumers, and optimize big data processing with Spark
and Airflow. Strong SQL and Python skills are required, along with experience in data
modeling and feature engineering for machine learning use cases. You'll work in an Agile
team with two-week sprints, participate in code review, and ship through our CI/CD
pipeline to production. Experience with Kafka, dbt, and Snowflake is a plus.`,
  phys: `Today's lecture covers classical mechanics. We begin with Newton's laws and the
concept of momentum, then derive equations for velocity and acceleration under a constant
force. We'll connect kinetic energy to work, discuss thermodynamics briefly, and preview
how electromagnetism and relativity reshape these ideas. Your homework from the textbook
is due before the next lecture; the exam will cover everything through this week's
coursework.`,
};

// ---- settings (persisted) -------------------------------------------------
function getBase() { return $('baseUrl').value.trim().replace(/\/+$/, ''); }
function getKey() { return $('apiKey').value.trim(); }
function apiUrl(path) { return getBase() + path; }
function apiHeaders(json) {
  const h = json ? { 'Content-Type': 'application/json' } : {};
  const k = getKey();
  if (k) h['X-API-Key'] = k;
  return h;
}
function saveSettings() {
  // Storage can throw in sandboxed/embedded contexts — never let it break the UI.
  try {
    localStorage.setItem('parserApi.baseUrl', $('baseUrl').value.trim());
    localStorage.setItem('parserApi.apiKey', $('apiKey').value);
  } catch (e) { /* storage unavailable */ }
}
function loadSettings() {
  let base = '', savedKey = null;
  try {
    base = localStorage.getItem('parserApi.baseUrl') || '';
    savedKey = localStorage.getItem('parserApi.apiKey');
  } catch (e) { /* storage unavailable */ }
  $('baseUrl').value = base;
  $('apiKey').value = savedKey !== null && savedKey !== undefined ? savedKey : INJECTED_KEY;
}

// ---- helpers --------------------------------------------------------------
function pct(x) { return Math.round((x || 0) * 100); }
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function netError(e) {
  // fetch() rejects (vs. an HTTP error response) on network / DNS / CORS failures.
  return `Couldn't reach the API. Check the base URL, that the server is running, and — for a
    cross-origin URL — that the API's ALLOWED_ORIGINS permits this page. (${escapeHtml(String(e))})`;
}
async function flash(btn, msg) {
  const old = btn.textContent; btn.textContent = msg;
  setTimeout(() => { btn.textContent = old; }, 1200);
}

// ---- health badge ---------------------------------------------------------
let healthTimer = null;
function scheduleHealth() { clearTimeout(healthTimer); healthTimer = setTimeout(loadHealth, 400); }
async function loadHealth() {
  const badge = $('badge'), text = $('badgeText');
  badge.className = 'badge'; text.textContent = 'checking…';
  try {
    const res = await fetch(apiUrl('/api/health'), { headers: apiHeaders(false) });
    const d = await res.json();
    if (res.ok && d.status === 'ok') {
      badge.className = 'badge ok';
      text.textContent = `v${d.version} · ${d.categories} categories`;
    } else {
      badge.className = 'badge bad'; text.textContent = `HTTP ${res.status}`;
    }
  } catch (e) {
    badge.className = 'badge bad'; text.textContent = 'unreachable';
  }
}

// ---- parse ----------------------------------------------------------------
$('go').addEventListener('click', run);
async function run() {
  const text = $('text').value.trim();
  if (!text) { out.innerHTML = '<div class="err">Enter some text first.</div>'; return; }
  $('go').disabled = true;
  out.innerHTML = '<div class="empty">Parsing…</div>';
  try {
    const res = await fetch(apiUrl('/api/parse'), {
      method: 'POST', headers: apiHeaders(true),
      body: JSON.stringify({ text, max_keywords: Number($('maxkw').value) || 15 }),
    });
    const data = await res.json();
    if (!res.ok) {
      out.innerHTML = `<div class="err">HTTP ${res.status}: ${escapeHtml(data.detail || 'error')}</div>`;
      return;
    }
    lastResponse = data;
    render(data);
  } catch (e) {
    out.innerHTML = `<div class="err">${netError(e)}</div>`;
  } finally {
    $('go').disabled = false;
  }
}

function emphCard(e, kind) {
  if (!e) return '';
  const chips = (e.matched_terms || []).map((t) => `<span class="chip">${escapeHtml(t)}</span>`).join('');
  return `<div class="emph ${kind}">
    <div class="tag">${kind} emphasis</div>
    <div class="label">${escapeHtml(e.label)}
      <span class="id">${escapeHtml(e.id || '')} · ${escapeHtml(e.type)}</span></div>
    <div class="bar"><i style="width:${pct(e.score)}%"></i></div>
    <div class="chips">${chips}</div>
  </div>`;
}

function render(d) {
  const m = d.meta || {};
  let html = '<div class="rtools"><button class="ghost sm" id="copyjson">Copy JSON</button></div>';
  html += emphCard(d.primary, 'primary') + emphCard(d.secondary, 'secondary');
  if (!d.primary) html += '<div class="err">No emphasis matched the taxonomy.</div>';

  html += '<h3>All ranked emphases</h3><div class="ranked">';
  (d.emphases || []).forEach((e) => {
    html += `<div class="item"><span class="nm">${escapeHtml(e.label)}</span>
      <span class="bar"><i style="width:${pct(e.score)}%"></i></span>
      <span class="pct">${pct(e.score)}%</span></div>`;
  });
  html += '</div>';

  html += '<h3>Specific keywords</h3><div class="chips">';
  (d.keywords || []).forEach((k) => {
    const cls = k.source === 'lexicon' ? 'lex' : (k.source === 'rake+lexicon' ? 'both' : '');
    const rel = k.related_emphasis ? ' · ' + k.related_emphasis : '';
    html += `<span class="chip ${cls}" title="${escapeHtml(k.source + rel)}">${escapeHtml(k.display || k.term)}<span class="s">${pct(k.score)}</span></span>`;
  });
  html += '</div>';

  const warn = m.low_confidence ? '<span class="warn">⚠ low confidence</span>' : '';
  html += `<div class="meta"><span>tokens: ${m.token_count}</span>
    <span>confidence: ${pct(m.confidence)}%</span> ${warn}
    <span>v${escapeHtml(m.version || '')}</span></div>`;
  html += `<details><summary>Raw JSON</summary><pre>${escapeHtml(JSON.stringify(d, null, 2))}</pre></details>`;
  out.innerHTML = html;
  $('copyjson').addEventListener('click', (ev) => copyJson(ev.target));
}

// ---- copy helpers ---------------------------------------------------------
function shellQuote(s) { return "'" + s.replace(/'/g, "'\\''") + "'"; }
async function copyToClipboard(textVal, btn) {
  try { await navigator.clipboard.writeText(textVal); flash(btn, 'Copied!'); }
  catch (e) { flash(btn, 'Copy failed'); }
}
$('copycurl').addEventListener('click', (ev) => {
  const text = $('text').value.trim();
  if (!text) { flash(ev.target, 'No text'); return; }
  const url = (getBase() || location.origin) + '/api/parse';
  const body = JSON.stringify({ text, max_keywords: Number($('maxkw').value) || 15 });
  const lines = [`curl -s ${shellQuote(url)}`, `-H 'Content-Type: application/json'`];
  if (getKey()) lines.push(`-H ${shellQuote('X-API-Key: ' + getKey())}`);
  lines.push(`-d ${shellQuote(body)}`);
  copyToClipboard(lines.join(' \\\n  '), ev.target);
});
function copyJson(btn) {
  if (!lastResponse) { flash(btn, 'No result'); return; }
  copyToClipboard(JSON.stringify(lastResponse, null, 2), btn);
}

// ---- taxonomy browser -----------------------------------------------------
async function loadTaxonomy() {
  const box = $('taxOut');
  box.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const res = await fetch(apiUrl('/api/taxonomy'), { headers: apiHeaders(false) });
    const d = await res.json();
    if (!res.ok) { box.innerHTML = `<div class="err">HTTP ${res.status}</div>`; return; }
    const groups = { field: [], sector: [] };
    (d.categories || []).forEach((c) => (groups[c.type] || (groups[c.type] = [])).push(c));
    const col = (title, items) => `<div><h3>${title} (${items.length})</h3>` +
      items.map((c) => `<div class="cat">${escapeHtml(c.label)}<span class="id">${escapeHtml(c.id)}</span></div>`).join('') + '</div>';
    box.innerHTML = col('Fields', groups.field || []) + col('Sectors', groups.sector || []);
    $('taxCount').textContent = `${d.count} categories · v${d.version}`;
    taxLoaded = true;
  } catch (e) {
    box.innerHTML = `<div class="err">${netError(e)}</div>`;
  }
}
$('taxBox').addEventListener('toggle', (e) => { if (e.target.open && !taxLoaded) loadTaxonomy(); });
$('taxRefresh').addEventListener('click', loadTaxonomy);

// ---- wire up presets + settings + init ------------------------------------
document.querySelectorAll('.presets button').forEach((b) => {
  b.addEventListener('click', () => {
    const k = b.dataset.ex;
    $('text').value = k === 'clear' ? '' : (EXAMPLES[k] || '');
  });
});
['baseUrl', 'apiKey'].forEach((id) => $(id).addEventListener('input', () => {
  saveSettings(); taxLoaded = false; scheduleHealth();
}));

loadSettings();
loadHealth();
